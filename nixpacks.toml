[phases.setup]
nixPkgs = ["python311", "gcc", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [". /opt/venv/bin/activate && cd frontend && npm run build"]

[start]
cmd = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
